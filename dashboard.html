<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard domowy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  /* ====================================================================
     Layout myslany pod telefon polozony POZIOMO (landscape).
     Jesli kiedys chcesz wrocic do pionu, sekcja @media (orientation: portrait)
     na dole pliku przelacza uklad automatycznie.
     ==================================================================== */

  :root {
    --sky-top: #0b1220;
    --sky-bottom: #131c33;
    --accent: #b9c7e0;
    --transition-speed: 2.5s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    transition: background var(--transition-speed) ease;
    color: #f5f7fa;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: clamp(12px, 2.5vh, 24px) clamp(20px, 3vw, 40px);
  }

  /* --- glowny wiersz: zegar / hero / statystyki, obok siebie --- */

  #container {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: clamp(12px, 3vw, 40px);
  }

  /* --- kolumna zegara --- */

  #col-clock {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  #clock {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: clamp(28px, 9vh, 54px);
    letter-spacing: 0.02em;
    line-height: 1;
    white-space: nowrap;
  }

  #date {
    margin-top: 6px;
    font-size: clamp(11px, 2.6vh, 14px);
    color: rgba(245,247,250,0.6);
    text-transform: capitalize;
    letter-spacing: 0.03em;
    max-width: 22vw;
  }

  /* --- kolumna glowna: ikona + temperatura --- */

  #col-main {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vw, 24px);
  }

  #icon-wrap {
    flex: 0 0 auto;
    width: clamp(60px, 20vh, 110px);
    height: clamp(60px, 20vh, 110px);
    color: var(--accent);
    transition: color var(--transition-speed) ease;
  }

  #icon-wrap svg { width: 100%; height: 100%; overflow: visible; }

  #main-text { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }

  #temp {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(56px, 22vh, 130px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    display: flex;
    align-items: flex-start;
  }

  #temp .deg { font-size: 0.35em; font-weight: 500; margin-top: 0.1em; }

  #condition {
    font-size: clamp(14px, 3.2vh, 20px);
    font-weight: 500;
    white-space: nowrap;
  }

  #location {
    font-size: clamp(11px, 2.4vh, 14px);
    color: rgba(245,247,250,0.55);
    margin-top: 2px;
  }

  #error-banner {
    display: none;
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 12px;
    color: rgba(245,247,250,0.7);
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 6px 14px;
    white-space: nowrap;
  }

  /* --- kolumna statystyk: siatka 2x2 --- */

  #col-stats {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(6px, 1.5vh, 14px) clamp(14px, 2vw, 28px);
  }

  .stat { text-align: left; }

  .stat .label {
    font-size: clamp(9px, 1.8vh, 11px);
    color: rgba(245,247,250,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .stat .value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(14px, 3vh, 19px);
    font-weight: 500;
    margin-top: 2px;
    white-space: nowrap;
  }

  /* --- dolny pasek: prognoza godzinowa --- */

  #hourly {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    gap: 4px;
    padding: clamp(8px, 1.5vh, 14px) clamp(10px, 2vw, 20px);
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    margin-top: clamp(8px, 1.5vh, 16px);
  }

  .hour {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    flex: 1;
    justify-content: center;
  }

  .hour .h-time {
    font-size: clamp(10px, 2vh, 12px);
    color: rgba(245,247,250,0.55);
  }

  .hour .h-icon { width: clamp(14px, 2.8vh, 18px); height: clamp(14px, 2.8vh, 18px); color: var(--accent); flex: 0 0 auto; }
  .hour .h-icon svg { width: 100%; height: 100%; }

  .hour .h-temp {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(11px, 2.2vh, 14px);
    font-weight: 500;
  }

  #footer {
    flex: 0 0 auto;
    text-align: center;
    font-size: 10px;
    color: rgba(245,247,250,0.3);
    margin-top: 4px;
  }

  /* proste animacje ikon pogodowych */
  @keyframes drift { 0%,100% { transform: translateX(-4px);} 50% { transform: translateX(4px);} }
  @keyframes rise { 0%,100% { transform: rotate(0deg);} 50% { transform: rotate(8deg);} }
  @keyframes fall { 0% { transform: translateY(-2px); opacity: 0.2;} 60% { opacity: 1;} 100% { transform: translateY(10px); opacity: 0;} }
  @keyframes flash { 0%,90%,100% { opacity: 0.9;} 92%,96% { opacity: 0.2;} }
  @keyframes pulse-slow { 0%,100% { opacity: 1;} 50% { opacity: 0.6;} }

  .anim-cloud { animation: drift 6s ease-in-out infinite; }
  .anim-sun { animation: rise 8s ease-in-out infinite; transform-origin: center; }
  .anim-drop { animation: fall 1.4s linear infinite; }
  .anim-drop:nth-child(2) { animation-delay: 0.3s; }
  .anim-drop:nth-child(3) { animation-delay: 0.6s; }
  .anim-bolt { animation: flash 3s ease-in-out infinite; }
  .anim-fog { animation: pulse-slow 4s ease-in-out infinite; }
  .anim-fog:nth-child(2) { animation-delay: 0.7s; }
  .anim-fog:nth-child(3) { animation-delay: 1.4s; }

  /* --- awaryjnie: gdyby telefon jednak wyswietlal w pionie --- */
  @media (orientation: portrait) {
    #container { flex-direction: column; justify-content: center; gap: clamp(8px, 2vh, 20px); }
    #col-clock { align-items: center; text-align: center; }
    #date { max-width: none; }
    #col-main { flex-direction: column; }
    #main-text { align-items: center; }
    #col-stats { grid-template-columns: repeat(4, 1fr); width: 100%; }
    .stat { text-align: center; }
    #clock { font-size: clamp(36px, 11vw, 64px); }
    #temp { font-size: clamp(80px, 26vw, 150px); }
    #icon-wrap { width: clamp(70px, 22vw, 120px); height: clamp(70px, 22vw, 120px); }
  }

  /* --- ekran pogody jako wlasciwy "home", caly uklad bez zmian --- */

  #home-view {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* --- podpowiedz "przesun w gore", maly pulsujacy uchwyt na dole --- */

  #swipe-hint {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    padding-top: clamp(6px, 1vh, 10px);
  }

  #swipe-hint button {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 999px;
    width: 44px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(245,247,250,0.5);
    animation: pulse-slow 3s ease-in-out infinite;
  }

  #swipe-hint svg { width: 16px; height: 16px; }

  /* --- nakladka menu, wjezdza od dolu --- */

  #menu-view {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #0b0e14 0%, #171c26 100%);
    transform: translateY(100%);
    transition: transform 0.35s ease;
    display: flex;
    flex-direction: column;
    padding: clamp(14px, 2.5vh, 26px) clamp(20px, 3vw, 40px);
    z-index: 10;
  }

  #menu-view.open { transform: translateY(0); }

  #menu-close {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    background: none;
    border: none;
    color: rgba(245,247,250,0.5);
    padding-bottom: clamp(10px, 2vh, 18px);
  }

  #menu-close svg { width: 20px; height: 20px; }

  #menu-title {
    flex: 0 0 auto;
    font-size: clamp(13px, 2.4vh, 15px);
    color: rgba(245,247,250,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: clamp(10px, 2vh, 18px);
  }

  #tile-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    grid-auto-rows: minmax(90px, 1fr);
    gap: clamp(10px, 2vw, 18px);
    align-content: start;
  }

  .tile {
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    color: #f5f7fa;
    border: none;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .tile:active { transform: scale(0.95); }

  .tile .tile-icon { width: clamp(28px, 5vh, 36px); height: clamp(28px, 5vh, 36px); }
  .tile .tile-icon svg { width: 100%; height: 100%; }

  .tile .tile-label {
    font-size: clamp(12px, 2.2vh, 14px);
    font-weight: 500;
  }

  /* --- widok Spotify: logowanie + odtwarzacz --- */

  #spotify-view {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #0b140e 0%, #16241a 100%);
    transform: translateY(100%);
    transition: transform 0.35s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(14px, 2.5vh, 26px) clamp(20px, 3vw, 40px);
    z-index: 20;
    gap: clamp(10px, 2vh, 18px);
  }

  #spotify-view.open { transform: translateY(0); }

  #spotify-close {
    position: absolute;
    top: clamp(14px, 2.5vh, 26px);
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    color: rgba(245,247,250,0.5);
  }

  #spotify-close svg { width: 20px; height: 20px; }

  #spotify-login-btn {
    background: #3fae63;
    color: #0b140e;
    border: none;
    border-radius: 999px;
    padding: 14px 28px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(14px, 2.6vh, 17px);
    cursor: pointer;
  }

  #spotify-status {
    font-size: clamp(12px, 2.2vh, 14px);
    color: rgba(245,247,250,0.55);
    text-align: center;
    max-width: 60vw;
  }

  #spotify-art {
    width: clamp(90px, 24vh, 160px);
    height: clamp(90px, 24vh, 160px);
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    object-fit: cover;
  }

  #spotify-track {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(16px, 3vh, 22px);
    font-weight: 500;
    text-align: center;
    max-width: 70vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #spotify-artist {
    font-size: clamp(12px, 2.2vh, 15px);
    color: rgba(245,247,250,0.55);
    text-align: center;
  }

  #spotify-controls {
    display: flex;
    align-items: center;
    gap: clamp(18px, 3vw, 32px);
  }

  #spotify-controls button {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    color: #f5f7fa;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #spotify-controls button svg { width: 100%; height: 100%; }

  #spotify-controls .btn-sm { width: clamp(34px, 6vh, 44px); height: clamp(34px, 6vh, 44px); padding: 9px; }
  #spotify-controls .btn-lg { width: clamp(48px, 8vh, 60px); height: clamp(48px, 8vh, 60px); padding: 13px; background: #3fae63; color: #0b140e; }

  #spotify-search-btn {
    position: absolute;
    top: clamp(14px, 2.5vh, 26px);
    right: clamp(20px, 3vw, 40px);
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    width: clamp(34px, 6vh, 40px);
    height: clamp(34px, 6vh, 40px);
    padding: 8px;
    color: #f5f7fa;
  }

  #spotify-search-btn svg { width: 100%; height: 100%; }

  #spotify-search-section {
    display: none;
    flex-direction: column;
    width: min(90vw, 480px);
    height: 100%;
    gap: clamp(8px, 1.5vh, 14px);
    padding-top: clamp(30px, 5vh, 50px);
  }

  #spotify-search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }

  #spotify-search-bar button {
    background: none;
    border: none;
    color: #f5f7fa;
    width: 28px;
    height: 28px;
    flex: 0 0 auto;
  }

  #spotify-search-bar button svg { width: 100%; height: 100%; }

  #spotify-search-input {
    flex: 0 0 auto;
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    color: #f5f7fa;
    font-family: 'Inter', sans-serif;
    font-size: clamp(13px, 2.4vh, 15px);
  }

  #spotify-search-input::placeholder { color: rgba(245,247,250,0.4); }

  #spotify-search-results {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .search-result {
    display: flex;
    align-items: center;
    gap: 10px;
    background: none;
    border: none;
    padding: 6px;
    border-radius: 10px;
    color: #f5f7fa;
    text-align: left;
  }

  .search-result:active { background: rgba(255,255,255,0.08); }

  .search-result img {
    width: clamp(34px, 6vh, 42px);
    height: clamp(34px, 6vh, 42px);
    border-radius: 6px;
    flex: 0 0 auto;
    background: rgba(255,255,255,0.06);
  }

  .search-result .sr-text { min-width: 0; }

  #spotify-browse-title {
    font-size: clamp(13px, 2.4vh, 15px);
    font-weight: 500;
    text-align: center;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sr-section-label {
    font-size: clamp(10px, 1.8vh, 11px);
    color: rgba(245,247,250,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 6px 2px;
  }

  #spotify-volume {
    display: flex;
    align-items: center;
    gap: 8px;
    width: min(70vw, 260px);
  }

  #spotify-volume svg { width: 16px; height: 16px; color: rgba(245,247,250,0.5); flex: 0 0 auto; }

  #spotify-volume input[type="range"] {
    flex: 1;
    accent-color: #3fae63;
  }

  .search-result .sr-title {
    font-size: clamp(12px, 2.2vh, 14px);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .search-result .sr-artist {
    font-size: clamp(11px, 2vh, 12px);
    color: rgba(245,247,250,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* --- widok zadan --- */

  #todo-view {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #120e1c 0%, #1e1830 100%);
    transform: translateY(100%);
    transition: transform 0.35s ease;
    display: flex;
    flex-direction: column;
    padding: clamp(14px, 2.5vh, 26px) clamp(20px, 3vw, 40px);
    z-index: 20;
  }

  #todo-view.open { transform: translateY(0); }

  #todo-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: clamp(10px, 2vh, 18px);
  }

  #todo-back {
    background: none;
    border: none;
    color: rgba(245,247,250,0.6);
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
  }

  #todo-back svg { width: 100%; height: 100%; }

  #todo-title {
    font-size: clamp(14px, 2.6vh, 17px);
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #todo-content {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #todo-input-bar {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    margin-top: clamp(10px, 2vh, 16px);
  }

  #todo-input-bar input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    color: #f5f7fa;
    font-family: 'Inter', sans-serif;
    font-size: clamp(13px, 2.4vh, 15px);
  }

  #todo-input-bar input::placeholder { color: rgba(245,247,250,0.4); }

  #todo-input-bar button {
    background: #7c6fd1;
    color: #120e1c;
    border: none;
    border-radius: 999px;
    padding: 0 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(13px, 2.4vh, 15px);
  }

  .todo-list-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.05);
    border: none;
    border-radius: 12px;
    padding: 12px 14px;
    color: #f5f7fa;
    text-align: left;
  }

  .todo-list-row:active { background: rgba(255,255,255,0.09); }

  .todo-list-row .tl-name {
    flex: 1;
    font-size: clamp(13px, 2.4vh, 15px);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .todo-list-row .tl-count {
    font-size: clamp(11px, 2vh, 13px);
    color: rgba(245,247,250,0.45);
    flex: 0 0 auto;
  }

  .todo-list-row .tl-delete {
    background: none;
    border: none;
    color: rgba(245,247,250,0.3);
    width: 20px;
    height: 20px;
    flex: 0 0 auto;
  }

  .todo-list-row .tl-delete svg { width: 100%; height: 100%; }

  .todo-task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .todo-task-row .tt-check {
    width: clamp(22px, 4.5vh, 26px);
    height: clamp(22px, 4.5vh, 26px);
    border-radius: 50%;
    border: 2px solid rgba(245,247,250,0.35);
    background: none;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
  }

  .todo-task-row.done .tt-check {
    background: #7c6fd1;
    border-color: #7c6fd1;
    color: #120e1c;
  }

  .todo-task-row .tt-check svg { width: 65%; height: 65%; }

  .todo-task-row .tt-text {
    flex: 1;
    font-size: clamp(13px, 2.6vh, 16px);
    word-break: break-word;
  }

  .todo-task-row.done .tt-text {
    text-decoration: line-through;
    color: rgba(245,247,250,0.4);
  }

  .todo-task-row .tt-delete {
    background: none;
    border: none;
    color: rgba(245,247,250,0.3);
    width: 20px;
    height: 20px;
    flex: 0 0 auto;
  }

  .todo-task-row .tt-delete svg { width: 100%; height: 100%; }

</style>
</head>
<body>

  <div id="home-view">

    <div id="error-banner"></div>

    <div id="container">

      <div id="col-clock">
        <div id="clock">--:--</div>
        <div id="date">-</div>
      </div>

      <div id="col-main">
        <div id="icon-wrap"></div>
        <div id="main-text">
          <div id="temp">--<span class="deg">°</span></div>
          <div id="condition">Ładowanie…</div>
          <div id="location"></div>
        </div>
      </div>

      <div id="col-stats">
        <div class="stat"><div class="label">Odczuwalna</div><div class="value" id="stat-feels">--°</div></div>
        <div class="stat"><div class="label">Wilgotność</div><div class="value" id="stat-humidity">--%</div></div>
        <div class="stat"><div class="label">Wiatr</div><div class="value" id="stat-wind">-- km/h</div></div>
        <div class="stat"><div class="label">Zachód</div><div class="value" id="stat-sunset">--:--</div></div>
      </div>

    </div>

    <div id="hourly"></div>

<script>

  // ==========================================================================

  function setTheme(cat, isDay) {
    const key = (isDay ? "day-" : "night-") + cat;
    const theme = THEMES[key] || THEMES["night-clear"];
    document.documentElement.style.setProperty("--sky-top", theme.top);
    document.documentElement.style.setProperty("--sky-bottom", theme.bottom);
    document.documentElement.style.setProperty("--accent", theme.accent);
  }

  function fmtHour(isoString) {
    return new Date(isoString).toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
  }

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("date").textContent =
      now.toLocaleDateString("pl-PL", { weekday: "long", day: "numeric", month: "long" });

  function showError(message) {
    const banner = document.getElementById("error-banner");
    banner.textContent = message;
    banner.style.display = "block";
  }

  function hideError() {
    document.getElementById("error-banner").style.display = "none";
  }

  async function fetchWeather() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.latitude}&longitude=${CONFIG.longitude}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,is_day` +
      `&hourly=temperature_2m,weather_code` +
      `&daily=sunrise,sunset` +
      `&timezone=auto&forecast_days=2`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      renderWeather(data);
      hideError();
    } catch (err) {
      console.error(err);
      showError("Nie udało się pobrać pogody — sprawdzam ponownie za chwilę.");
    }
  }

  function renderWeather(data) {
    const cur = data.current;
    const info = WEATHER_CODES[cur.weather_code] || { text: "Brak danych", cat: "cloud" };
    const isDay = cur.is_day === 1;

    setTheme(info.cat, isDay);

    document.getElementById("icon-wrap").innerHTML = ICONS[info.cat] || ICONS.cloud;
    document.getElementById("temp").innerHTML = Math.round(cur.temperature_2m) + '<span class="deg">°</span>';
    document.getElementById("condition").textContent = info.text;
    document.getElementById("location").textContent = CONFIG.cityName;

    document.getElementById("stat-feels").textContent = Math.round(cur.apparent_temperature) + "°";
    document.getElementById("stat-humidity").textContent = Math.round(cur.relative_humidity_2m) + "%";
    document.getElementById("stat-wind").textContent = Math.round(cur.wind_speed_10m) + " km/h";
    document.getElementById("stat-sunset").textContent = fmtHour(data.daily.sunset[0]);

    renderHourly(data.hourly, cur.time);

    document.getElementById("last-updated").textContent =
      new Date().toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
  }

  function renderHourly(hourly, currentTimeIso) {
    const container = document.getElementById("hourly");
    container.innerHTML = "";

    let startIndex = hourly.time.findIndex(t => t >= currentTimeIso);
    if (startIndex === -1) startIndex = 0;

    for (let i = startIndex + 1; i <= startIndex + 6; i++) {
      if (!hourly.time[i]) continue;
      const code = hourly.weather_code[i];
      const info = WEATHER_CODES[code] || { cat: "cloud" };
      const el = document.createElement("div");
      el.className = "hour";
      el.innerHTML = `
        <div class="h-time">${fmtHour(hourly.time[i])}</div>
        <div class="h-icon">${ICONS[info.cat] || ICONS.cloud}</div>
        <div class="h-temp">${Math.round(hourly.temperature_2m[i])}°</div>
      `;
      container.appendChild(el);
    }
  }

  async function keepScreenAwake() {
    try {
      if ("wakeLock" in navigator) {
        await navigator.wakeLock.request("screen");

    } catch (err) {
      console.warn("Wake lock nieobsługiwany lub odrzucony:", err);

  }

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") keepScreenAwake();

  function renderMenu() {
    const grid = document.getElementById("tile-grid");
    grid.innerHTML = "";
    TILES.forEach(tile => {
      const el = document.createElement(tile.url ? "a" : "button");
      el.className = "tile";
      el.style.background = tile.background;
      if (tile.url) {
        el.href = tile.url;
      } else {
        el.type = "button";
        el.addEventListener("click", () => {
          if (tile.action === "home") closeMenu();
          if (tile.action === "spotify") { closeMenu(); openSpotifyView(); }
          if (tile.action === "todo") { closeMenu(); openTodoView(); }
        });
      }
      el.innerHTML = `<span class="tile-icon">${tile.icon}</span><span class="tile-label">${tile.label}</span>`;
      grid.appendChild(el);

  function openMenu() {
    document.getElementById("menu-view").classList.add("open");
  }

  function closeMenu() {
    document.getElementById("menu-view").classList.remove("open");
  }

  // Obsluga gestu przesuniecia palcem: w gore na ekranie pogody otwiera menu,
  // w dol na menu je zamyka. Dziala rownolegle z przyciskami-strzalkami,
  // ktore sa awaryjnym sposobem sterowania, gdyby gest nie zadzialal w danej przegladarce.
  let touchStartY = null;
  const SWIPE_THRESHOLD = 60;

  document.addEventListener("touchstart", (e) => {
    if (e.target.closest("button, a")) { touchStartY = null; return; }
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener("touchend", (e) => {
    if (touchStartY === null) return;
    const deltaY = e.changedTouches[0].clientY - touchStartY;
    const menuOpen = document.getElementById("menu-view").classList.contains("open");
    const spotifyOpen = document.getElementById("spotify-view").classList.contains("open");
    const todoOpen = document.getElementById("todo-view").classList.contains("open");

    if (!menuOpen && !spotifyOpen && !todoOpen && deltaY < -SWIPE_THRESHOLD) {
      openMenu();
    } else if (menuOpen && deltaY > SWIPE_THRESHOLD) {
      closeMenu();
    } else if (spotifyOpen && deltaY > SWIPE_THRESHOLD) {
      closeSpotifyView();
    } else if (todoOpen && deltaY > SWIPE_THRESHOLD) {
      todoGoBack();
    }
    touchStartY = null;
  }, { passive: true });

  // ==========================================================================
  // SPOTIFY — logowanie metoda "Authorization Code with PKCE" (bezpieczna,
  // nie wymaga trzymania zadnego sekretu w kodzie strony) i sterowanie
  // odtwarzaniem przez oficjalne Spotify Web API.
  // ==========================================================================

  function randomString(length) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    const values = crypto.getRandomValues(new Uint8Array(length));
    return Array.from(values).map(v => chars[v % chars.length]).join("");
  }

  async function sha256base64url(plain) {
    const data = new TextEncoder().encode(plain);
    const digest = await crypto.subtle.digest("SHA-256", data);
    let str = "";
    new Uint8Array(digest).forEach(b => str += String.fromCharCode(b));
    return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function getSpotifyTokens() {
    try { return JSON.parse(localStorage.getItem("spotify_tokens") || "null"); }
    catch { return null; }
  }

  function saveSpotifyTokens(data) {
    const existing = getSpotifyTokens() || {};
    const tokens = {
      access_token: data.access_token,
      refresh_token: data.refresh_token || existing.refresh_token,
      expires_at: Date.now() + (data.expires_in * 1000)
    };
    localStorage.setItem("spotify_tokens", JSON.stringify(tokens));
    return tokens;
  }

  async function startSpotifyLogin() {
    if (SPOTIFY_CONFIG.clientId === "WKLEJ_TU_SWOJ_CLIENT_ID") {
      document.getElementById("spotify-status").textContent =
        "Najpierw uzupełnij SPOTIFY_CONFIG.clientId w pliku dashboard.html.";
      return;
    }
    const verifier = randomString(64);
    localStorage.setItem("spotify_verifier", verifier);
    const challenge = await sha256base64url(verifier);
    const params = new URLSearchParams({
      client_id: SPOTIFY_CONFIG.clientId,
      response_type: "code",
      redirect_uri: SPOTIFY_CONFIG.redirectUri,
      scope: SPOTIFY_CONFIG.scopes,
      code_challenge_method: "S256",
      code_challenge: challenge
    });
    window.location.href = "https://accounts.spotify.com/authorize?" + params.toString();
  }

  async function handleSpotifyRedirect() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (!code) return;

    const verifier = localStorage.getItem("spotify_verifier");
    const body = new URLSearchParams({
      client_id: SPOTIFY_CONFIG.clientId,
      grant_type: "authorization_code",
      code,
      redirect_uri: SPOTIFY_CONFIG.redirectUri,
      code_verifier: verifier
    });

    try {
      const res = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });
      const data = await res.json();
      if (data.access_token) {
        saveSpotifyTokens(data);
        openSpotifyView();
      }
    } catch (err) {
      console.error("Blad logowania Spotify:", err);
    }

    window.history.replaceState({}, document.title, SPOTIFY_CONFIG.redirectUri);
  }

  async function ensureSpotifyToken() {
    let tokens = getSpotifyTokens();
    if (!tokens) return null;

    if (Date.now() < tokens.expires_at - 60000) return tokens.access_token;

    const body = new URLSearchParams({
      client_id: SPOTIFY_CONFIG.clientId,
      grant_type: "refresh_token",
      refresh_token: tokens.refresh_token
    });

    try {
      const res = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });
      const data = await res.json();
      if (data.access_token) {
        tokens = saveSpotifyTokens(data);
        return tokens.access_token;
      }
    } catch (err) {
      console.error("Blad odswiezania tokena Spotify:", err);
    }
    return null;
  }

  async function spotifyApi(path, options = {}) {
    const token = await ensureSpotifyToken();
    if (!token) throw new Error("brak-logowania");
    return fetch("https://api.spotify.com/v1" + path, {
      ...options,
      headers: { ...(options.headers || {}), Authorization: "Bearer " + token }
    });
  }

  let spotifyPollTimer = null;
  let spotifyIsPlaying = false;

  async function refreshSpotifyNowPlaying() {
    const statusEl = document.getElementById("spotify-status");
    try {
      const res = await spotifyApi("/me/player");
      if (res.status === 204) {
        statusEl.textContent = "Nic teraz nie gra. Włącz coś w aplikacji Spotify na innym urządzeniu.";
        document.getElementById("spotify-art").style.display = "none";
        document.getElementById("spotify-track").textContent = "—";
        document.getElementById("spotify-artist").textContent = "—";
        return;
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (!data || !data.item) return;

      if (data.device && typeof data.device.volume_percent === "number") {
        document.getElementById("spotify-volume-slider").value = data.device.volume_percent;
      }

      spotifyIsPlaying = data.is_playing;
      document.getElementById("spotify-track").textContent = data.item.name;

      const artists = data.item.artists
        ? data.item.artists.map(a => a.name).join(", ")
        : (data.item.show ? data.item.show.name : "");
      document.getElementById("spotify-artist").textContent = artists;

      const art = (data.item.album && data.item.album.images && data.item.album.images[0])
        || (data.item.images && data.item.images[0]);
      const artEl = document.getElementById("spotify-art");
      if (art) {
        artEl.src = art.url;
        artEl.style.display = "block";
      } else {
        artEl.removeAttribute("src");
        artEl.style.display = "none";
      }

      document.getElementById("spotify-playpause").innerHTML = spotifyIsPlaying
        ? `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;

      statusEl.textContent = "";
    } catch (err) {
      if (err.message === "brak-logowania") return;
      console.error(err);
      statusEl.textContent = "Nie udało się pobrać danych z Spotify.";
    }
  }

  async function spotifyTogglePlay() {
    try {
      const res = await spotifyApi(spotifyIsPlaying ? "/me/player/pause" : "/me/player/play", { method: "PUT" });
      if (!res.ok) { const body = await res.text(); throw new Error("HTTP " + res.status + " " + body.slice(0, 150)); }
      spotifyIsPlaying = !spotifyIsPlaying;

  // ==========================================================================
  // HISTORIA — pokazuje sie domyslnie po otwarciu wyszukiwarki. Zapisujemy tu
  // faktycznie klikniete utwory/wykonawcow/albumy (z okladka), nie sam tekst
  // zapytania — klikniecie w pozycje od razu odtwarza/otwiera dany element.
  // ==========================================================================

  function getRecentItems() {
    try { return JSON.parse(localStorage.getItem("spotify_recent_items") || "[]"); }
    catch { return []; }
  }

  function addRecentItem(item) {
    let items = getRecentItems().filter(i => !(i.kind === item.kind && i.id === item.id));
    items.unshift(item);
    items = items.slice(0, 12);
    localStorage.setItem("spotify_recent_items", JSON.stringify(items));
  }

  function clearRecentItems() {
    localStorage.removeItem("spotify_recent_items");
    showSearchHistory();
  }

  function openRecentItem(item) {
    if (item.kind === "track") {
      playSpotifyTrack(item.uri);
    } else if (item.kind === "artist") {
      showArtist({ id: item.id, name: item.name });
    } else if (item.kind === "album") {
      showAlbum({ id: item.id, name: item.name, uri: item.uri, artists: [{ name: item.subtitle }], images: item.image ? [{ url: item.image }] : [] });
    }
  }

  function showSearchHistory() {
    setBrowseTitle("Historia");
    spotifyBrowseBack = null;
    const items = getRecentItems();
    const el = document.getElementById("spotify-search-results");
    el.innerHTML = "";

    if (items.length === 0) {
      el.innerHTML = `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Zacznij wpisywać, żeby wyszukać utwór, wykonawcę lub album.</div>`;
      return;
    }

    items.forEach(item => {
      el.appendChild(makeRow(item.name, item.subtitle, item.image, () => openRecentItem(item)));
    });

    const clearBtn = document.createElement("button");
    clearBtn.type = "button";
    clearBtn.textContent = "Wyczyść historię";
    clearBtn.style.cssText = "background:none; border:none; color: rgba(245,247,250,0.35); font-size: 11px; font-family: 'Inter', sans-serif; text-decoration: underline; padding: 10px 6px; align-self: flex-start;";
    clearBtn.onclick = clearRecentItems;
    el.appendChild(clearBtn);
  }

  function spotifyBrowseGoBack() {
    if (spotifyBrowseBack) {
      const fn = spotifyBrowseBack;
      spotifyBrowseBack = null;
      fn();
    } else {
      closeSpotifySearch();
    }
  }

  function setBrowseTitle(text) {
    document.getElementById("spotify-browse-title").textContent = text;
  }

  function setBrowseLoading() {
    document.getElementById("spotify-search-results").innerHTML =
      `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Ładowanie…</div>`;
  }

  function setBrowseError(detail) {
    document.getElementById("spotify-search-results").innerHTML =
      `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Coś poszło nie tak${detail ? " (" + detail + ")" : ""}.</div>`;
  }

  function sectionLabel(text) {
    const div = document.createElement("div");
    div.className = "sr-section-label";
    div.textContent = text;
    return div;
  }

  function makeRow(title, subtitle, imgUrl, onClick) {
    const btn = document.createElement("button");
    btn.className = "search-result";
    btn.type = "button";
    btn.innerHTML = `
      ${imgUrl ? `<img src="${imgUrl}" alt="">` : `<div style="width:36px;height:36px;border-radius:6px;background:rgba(255,255,255,0.06);flex:0 0 auto;"></div>`}
      <div class="sr-text">
        <div class="sr-title">${title}</div>
        <div class="sr-artist">${subtitle || ""}</div>
      </div>
    `;
    btn.addEventListener("click", onClick);
    return btn;
  }

  async function getSpotifyMarket() {
    if (spotifyMarket) return spotifyMarket;
    try {
      const res = await spotifyApi("/me");
      const data = await res.json();
      spotifyMarket = data.country || "PL";
    } catch {
      spotifyMarket = "PL";
    }
    return spotifyMarket;
  }

  async function showSpotifyPlaylists() {
    setBrowseTitle("Twoje playlisty");
    spotifyBrowseBack = null;
    setBrowseLoading();
    try {
      const res = await spotifyApi("/me/playlists?limit=30");
      if (!res.ok) {
        const body = await res.text();
        throw new Error("HTTP " + res.status + " " + body.slice(0, 150));
      }
      const data = await res.json();
      const el = document.getElementById("spotify-search-results");
      el.innerHTML = "";
      if (!data.items || data.items.length === 0) {
        el.innerHTML = `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Nie masz jeszcze żadnych playlist.</div>`;
        return;
      }
      data.items.forEach(pl => {
        el.appendChild(makeRow(
          pl.name,
          "Playlista",
          pl.images && pl.images[0] ? pl.images[0].url : "",
          () => showPlaylistTracks(pl)
        ));
      });
    } catch (err) {
      console.error(err);
      setBrowseError(err.message);
    }
  }

  function showPlaylistTracks(playlist) {
    setBrowseTitle(playlist.name);
    spotifyBrowseBack = showSpotifyPlaylists;
    const el = document.getElementById("spotify-search-results");
    el.innerHTML = "";
    el.appendChild(makeRow(
      "▶  Odtwórz całą playlistę",
      "",
      playlist.images && playlist.images[0] ? playlist.images[0].url : "",
      () => playSpotifyContext(playlist.uri)
    ));
    el.innerHTML += `<div style="color: rgba(245,247,250,0.4); font-size: 12px; padding: 12px 6px;">Spotify nie pozwala aplikacjom takim jak ta pokazywać pojedynczych utworów z playlist — możesz jednak odtworzyć całą playlistę na aktywnym urządzeniu.</div>`;
  }

  async function showAlbum(album) {
    setBrowseTitle(album.name);
    const backFn = spotifyBrowseBack;
    spotifyBrowseBack = backFn || showSearchHistory;
    setBrowseLoading();
    try {
      const res = await spotifyApi(`/albums/${album.id}/tracks?limit=50`);
      if (!res.ok) {
        const body = await res.text();
        throw new Error("HTTP " + res.status + " " + body.slice(0, 150));
      }
      const data = await res.json();
      const el = document.getElementById("spotify-search-results");
      el.innerHTML = "";
      el.appendChild(makeRow("▶  Odtwórz cały album", (album.artists || []).filter(Boolean).map(a => a.name).join(", "), album.images && album.images[0] ? album.images[0].url : "", () => playSpotifyContext(album.uri)));
      data.items.forEach(t => {
        el.appendChild(makeRow(
          t.name,
          (t.artists || []).filter(Boolean).map(a => a.name).join(", "),
          album.images && album.images.length ? album.images[album.images.length - 1].url : "",
          () => playSpotifyTrack(t.uri)
        ));
      });
    } catch (err) {
      console.error(err);
      setBrowseError(err.message);
    }
  }

  async function showArtist(artist) {
    setBrowseTitle(artist.name);
    const backFn = spotifyBrowseBack;
    spotifyBrowseBack = backFn || showSearchHistory;
    setBrowseLoading();
    try {
      const market = await getSpotifyMarket();
      const res = await spotifyApi(`/artists/${artist.id}/top-tracks?market=${market}`);
      if (!res.ok) {
        const body = await res.text();
        throw new Error("HTTP " + res.status + " " + body.slice(0, 150));
      }
      const data = await res.json();
      const el = document.getElementById("spotify-search-results");
      el.innerHTML = "";
      el.appendChild(sectionLabel("Najpopularniejsze utwory"));
      (data.tracks || []).forEach(t => {
        el.appendChild(makeRow(
          t.name,
          t.album ? t.album.name : "",
          t.album && t.album.images && t.album.images.length ? t.album.images[t.album.images.length - 1].url : "",
          () => playSpotifyTrack(t.uri)
        ));
      });
    } catch (err) {
      console.error(err);
      setBrowseError(err.message);
    }
  }

  function onSpotifySearchInput() {
    clearTimeout(spotifySearchDebounce);
    const query = document.getElementById("spotify-search-input").value.trim();
    if (!query) {
      showSearchHistory();
      return;
    }
    spotifySearchDebounce = setTimeout(() => runSpotifySearch(query), 400);
  }

  async function runSpotifySearch(query) {
    setBrowseTitle("Wyniki: " + query);
    spotifyBrowseBack = showSearchHistory;
    setBrowseLoading();
    try {
      const res = await spotifyApi("/search?type=track,artist,album,playlist&limit=6&q=" + encodeURIComponent(query));
      if (!res.ok) {
        const body = await res.text();
        throw new Error("HTTP " + res.status + " " + body.slice(0, 120));
      }
      const data = await res.json();
      const el = document.getElementById("spotify-search-results");
      el.innerHTML = "";

      const tracks = ((data.tracks && data.tracks.items) || []).filter(Boolean);
      const artists = ((data.artists && data.artists.items) || []).filter(Boolean);
      const albums = ((data.albums && data.albums.items) || []).filter(Boolean);
      const playlists = ((data.playlists && data.playlists.items) || []).filter(Boolean);

      if (tracks.length === 0 && artists.length === 0 && albums.length === 0 && playlists.length === 0) {
        el.innerHTML = `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Brak wyników.</div>`;
        return;
      }

      if (tracks.length) {
        el.appendChild(sectionLabel("Utwory"));
        tracks.forEach(t => {
          const subtitle = (t.artists || []).filter(Boolean).map(a => a.name).join(", ");
          const image = t.album && t.album.images && t.album.images.length ? t.album.images[t.album.images.length - 1].url : "";
          el.appendChild(makeRow(t.name, subtitle, image, () => {
            addRecentItem({ kind: "track", id: t.id, uri: t.uri, name: t.name, subtitle, image });
            playSpotifyTrack(t.uri);
          }));
        });
      }
      if (artists.length) {
        el.appendChild(sectionLabel("Wykonawcy"));
        artists.forEach(a => {
          const image = a.images && a.images.length ? a.images[a.images.length - 1].url : "";
          el.appendChild(makeRow(a.name, "Wykonawca", image, () => {
            addRecentItem({ kind: "artist", id: a.id, uri: a.uri, name: a.name, subtitle: "Wykonawca", image });
            showArtist(a);
          }));
        });
      }
      if (albums.length) {
        el.appendChild(sectionLabel("Albumy"));
        albums.forEach(al => {
          const subtitle = (al.artists || []).filter(Boolean).map(a => a.name).join(", ");
          const image = al.images && al.images.length ? al.images[al.images.length - 1].url : "";
          el.appendChild(makeRow(al.name, subtitle, image, () => {
            addRecentItem({ kind: "album", id: al.id, uri: al.uri, name: al.name, subtitle, image });
            showAlbum(al);
          }));
        });
      }
      if (playlists.length) {
        el.appendChild(sectionLabel("Playlisty"));
        playlists.forEach(pl => el.appendChild(makeRow(
          pl.name, pl.owner ? pl.owner.display_name : "",
          pl.images && pl.images[0] ? pl.images[0].url : "",
          () => showPlaylistTracks(pl)
        )));
      }
    } catch (err) {
      console.error(err);
      setBrowseError(err.message);
    }
  }

  async function playSpotifyTrack(uri) {
    try {
      const res = await spotifyApi("/me/player/play", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uris: [uri] })
      });
      if (!res.ok) {
        const body = await res.text();
        throw new Error("HTTP " + res.status + " " + body.slice(0, 150));
      }
      closeSpotifySearch();
      document.getElementById("spotify-status").textContent = "";
      setTimeout(refreshSpotifyNowPlaying, 600);
    } catch (err) {
      console.error(err);
      document.getElementById("spotify-status").textContent = "Nie udało się odtworzyć: " + err.message;
    }
  }

  async function playSpotifyContext(contextUri) {
    try {
      const res = await spotifyApi("/me/player/play", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ context_uri: contextUri })
      });
      if (!res.ok) {
        const body = await res.text();
        throw new Error("HTTP " + res.status + " " + body.slice(0, 150));
      }
      closeSpotifySearch();
      document.getElementById("spotify-status").textContent = "";
      setTimeout(refreshSpotifyNowPlaying, 600);
    } catch (err) {
      console.error(err);
      document.getElementById("spotify-status").textContent =
        "Nie udało się odtworzyć: " + err.message;
    }
  }

  let todoCurrentListId = null; // null = jestesmy na ekranie "wszystkie listy"

  function renderTodoListsScreen() {
    document.getElementById("todo-title").textContent = "Zadania";
    document.getElementById("todo-input").placeholder = "Nazwa nowej listy…";
    const content = document.getElementById("todo-content");
    content.innerHTML = "";

    const lists = getTodoLists();
    if (lists.length === 0) {
      content.innerHTML = `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Nie masz jeszcze żadnej listy — dodaj pierwszą na dole.</div>`;
      return;
    }

    lists.forEach(list => {
      const openCount = list.tasks.filter(t => !t.done).length;
      const row = document.createElement("button");
      row.type = "button";
      row.className = "todo-list-row";
      row.innerHTML = `
        <span class="tl-name">${list.name}</span>
        <span class="tl-count">${openCount}</span>
        <span class="tl-delete" title="Usuń listę">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </span>
      `;
      row.querySelector(".tl-delete").addEventListener("click", (e) => {
        e.stopPropagation();
        deleteTodoList(list.id);
      });
      row.addEventListener("click", () => {
        todoCurrentListId = list.id;
        renderTodoScreen();
      });
      content.appendChild(row);
    });
  }

  function renderTodoTasksScreen() {
    const lists = getTodoLists();
    const list = lists.find(l => l.id === todoCurrentListId);
    if (!list) { todoCurrentListId = null; renderTodoListsScreen(); return; }

    document.getElementById("todo-title").textContent = list.name;
    document.getElementById("todo-input").placeholder = "Nowa pozycja…";
    const content = document.getElementById("todo-content");
    content.innerHTML = "";

    if (list.tasks.length === 0) {
      content.innerHTML = `<div style="color: rgba(245,247,250,0.5); font-size: 13px; padding: 8px;">Ta lista jest pusta — dodaj pierwszą pozycję na dole.</div>`;
      return;
    }

    list.tasks.forEach(task => {
      const row = document.createElement("div");
      row.className = "todo-task-row" + (task.done ? " done" : "");
      row.innerHTML = `
        <button class="tt-check" type="button" aria-label="Odhacz">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <div class="tt-text">${task.text}</div>
        <button class="tt-delete" type="button" aria-label="Usuń">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      row.querySelector(".tt-check").addEventListener("click", () => toggleTodoTask(task.id));
      row.querySelector(".tt-delete").addEventListener("click", () => deleteTodoTask(task.id));
      content.appendChild(row);
    });
  }

  function todoSubmitInput() {
    const input = document.getElementById("todo-input");
    const value = input.value.trim();
    if (!value) return;
    input.value = "";

    if (todoCurrentListId === null) {
      createTodoList(value);
    } else {
      addTodoTask(todoCurrentListId, value);
    }
  }

  function createTodoList(name) {
    const lists = getTodoLists();
    lists.push({ id: "list_" + Date.now(), name, tasks: [] });
    saveTodoLists(lists);
    renderTodoListsScreen();
  }

  function deleteTodoList(listId) {
    const lists = getTodoLists().filter(l => l.id !== listId);
    saveTodoLists(lists);
    renderTodoListsScreen();
  }

  function addTodoTask(listId, text) {
    const lists = getTodoLists();
    const list = lists.find(l => l.id === listId);
    if (!list) return;
    list.tasks.push({ id: "task_" + Date.now(), text, done: false });
    saveTodoLists(lists);
    renderTodoTasksScreen();
  }

  function toggleTodoTask(taskId) {
    const lists = getTodoLists();
    const list = lists.find(l => l.id === todoCurrentListId);
    if (!list) return;
    const task = list.tasks.find(t => t.id === taskId);
    if (!task) return;
    task.done = !task.done;
    saveTodoLists(lists);
    renderTodoTasksScreen();
  }

  function deleteTodoTask(taskId) {
    const lists = getTodoLists();
    const list = lists.find(l => l.id === todoCurrentListId);
    if (!list) return;
    list.tasks = list.tasks.filter(t => t.id !== taskId);
    saveTodoLists(lists);
    renderTodoTasksScreen();
  }

  // Start
  document.getElementById("spotify-redirect-debug").textContent =
    "Redirect URI używany przez tę stronę: " + SPOTIFY_CONFIG.redirectUri;
  handleSpotifyRedirect();
  renderMenu();
  updateClock();
  setInterval(updateClock, 1000);
  fetchWeather();
  setInterval(fetchWeather, CONFIG.refreshMinutes * 60 * 1000);
  keepScreenAwake();

</script>
</body>
</html>
