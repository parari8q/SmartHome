<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard domowy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  /* ====================================================================
     Layout myslany pod telefon polozony POZIOMO (landscape).
     Jesli kiedys chcesz wrocic do pionu, sekcja @media (orientation: portrait)
     na dole pliku przelacza uklad automatycznie.
     ==================================================================== */

  :root {
    --sky-top: #0b1220;
    --sky-bottom: #131c33;
    --accent: #b9c7e0;
    --transition-speed: 2.5s;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    transition: background var(--transition-speed) ease;
    color: #f5f7fa;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: clamp(12px, 2.5vh, 24px) clamp(20px, 3vw, 40px);
  }

  /* --- glowny wiersz: zegar / hero / statystyki, obok siebie --- */

  #container {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: clamp(12px, 3vw, 40px);
  }

  /* --- kolumna zegara --- */

  #col-clock {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  #clock {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: clamp(28px, 9vh, 54px);
    letter-spacing: 0.02em;
    line-height: 1;
    white-space: nowrap;
  }

  #date {
    margin-top: 6px;
    font-size: clamp(11px, 2.6vh, 14px);
    color: rgba(245,247,250,0.6);
    text-transform: capitalize;
    letter-spacing: 0.03em;
    max-width: 22vw;
  }

  /* --- kolumna glowna: ikona + temperatura --- */

  #col-main {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vw, 24px);
  }

  #icon-wrap {
    flex: 0 0 auto;
    width: clamp(60px, 20vh, 110px);
    height: clamp(60px, 20vh, 110px);
    color: var(--accent);
    transition: color var(--transition-speed) ease;
  }

  #icon-wrap svg { width: 100%; height: 100%; overflow: visible; }

  #main-text { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }

  #temp {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(56px, 22vh, 130px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    display: flex;
    align-items: flex-start;
  }

  #temp .deg { font-size: 0.35em; font-weight: 500; margin-top: 0.1em; }

  #condition {
    font-size: clamp(14px, 3.2vh, 20px);
    font-weight: 500;
    white-space: nowrap;
  }

  #location {
    font-size: clamp(11px, 2.4vh, 14px);
    color: rgba(245,247,250,0.55);
    margin-top: 2px;
  }

  #error-banner {
    display: none;
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 12px;
    color: rgba(245,247,250,0.7);
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 6px 14px;
    white-space: nowrap;
  }

  /* --- kolumna statystyk: siatka 2x2 --- */

  #col-stats {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(6px, 1.5vh, 14px) clamp(14px, 2vw, 28px);
  }

  .stat { text-align: left; }

  .stat .label {
    font-size: clamp(9px, 1.8vh, 11px);
    color: rgba(245,247,250,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .stat .value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(14px, 3vh, 19px);
    font-weight: 500;
    margin-top: 2px;
    white-space: nowrap;
  }

  /* --- dolny pasek: prognoza godzinowa --- */

  #hourly {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    gap: 4px;
    padding: clamp(8px, 1.5vh, 14px) clamp(10px, 2vw, 20px);
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    margin-top: clamp(8px, 1.5vh, 16px);
  }

  .hour {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    flex: 1;
    justify-content: center;
  }

  .hour .h-time {
    font-size: clamp(10px, 2vh, 12px);
    color: rgba(245,247,250,0.55);
  }

  .hour .h-icon { width: clamp(14px, 2.8vh, 18px); height: clamp(14px, 2.8vh, 18px); color: var(--accent); flex: 0 0 auto; }
  .hour .h-icon svg { width: 100%; height: 100%; }

  .hour .h-temp {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(11px, 2.2vh, 14px);
    font-weight: 500;
  }

  #footer {
    flex: 0 0 auto;
    text-align: center;
    font-size: 10px;
    color: rgba(245,247,250,0.3);
    margin-top: 4px;
  }

  /* proste animacje ikon pogodowych */
  @keyframes drift { 0%,100% { transform: translateX(-4px);} 50% { transform: translateX(4px);} }
  @keyframes rise { 0%,100% { transform: rotate(0deg);} 50% { transform: rotate(8deg);} }
  @keyframes fall { 0% { transform: translateY(-2px); opacity: 0.2;} 60% { opacity: 1;} 100% { transform: translateY(10px); opacity: 0;} }
  @keyframes flash { 0%,90%,100% { opacity: 0.9;} 92%,96% { opacity: 0.2;} }
  @keyframes pulse-slow { 0%,100% { opacity: 1;} 50% { opacity: 0.6;} }

  .anim-cloud { animation: drift 6s ease-in-out infinite; }
  .anim-sun { animation: rise 8s ease-in-out infinite; transform-origin: center; }
  .anim-drop { animation: fall 1.4s linear infinite; }
  .anim-drop:nth-child(2) { animation-delay: 0.3s; }
  .anim-drop:nth-child(3) { animation-delay: 0.6s; }
  .anim-bolt { animation: flash 3s ease-in-out infinite; }
  .anim-fog { animation: pulse-slow 4s ease-in-out infinite; }
  .anim-fog:nth-child(2) { animation-delay: 0.7s; }
  .anim-fog:nth-child(3) { animation-delay: 1.4s; }

  /* --- awaryjnie: gdyby telefon jednak wyswietlal w pionie --- */
  @media (orientation: portrait) {
    #container { flex-direction: column; justify-content: center; gap: clamp(8px, 2vh, 20px); }
    #col-clock { align-items: center; text-align: center; }
    #date { max-width: none; }
    #col-main { flex-direction: column; }
    #main-text { align-items: center; }
    #col-stats { grid-template-columns: repeat(4, 1fr); width: 100%; }
    .stat { text-align: center; }
    #clock { font-size: clamp(36px, 11vw, 64px); }
    #temp { font-size: clamp(80px, 26vw, 150px); }
    #icon-wrap { width: clamp(70px, 22vw, 120px); height: clamp(70px, 22vw, 120px); }
  }

  /* --- ekran pogody jako wlasciwy "home", caly uklad bez zmian --- */

  #home-view {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* --- podpowiedz "przesun w gore", maly pulsujacy uchwyt na dole --- */

  #swipe-hint {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    padding-top: clamp(6px, 1vh, 10px);
  }

  #swipe-hint button {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 999px;
    width: 44px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(245,247,250,0.5);
    animation: pulse-slow 3s ease-in-out infinite;
  }

  #swipe-hint svg { width: 16px; height: 16px; }

  /* --- nakladka menu, wjezdza od dolu --- */

  #menu-view {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #0b0e14 0%, #171c26 100%);
    transform: translateY(100%);
    transition: transform 0.35s ease;
    display: flex;
    flex-direction: column;
    padding: clamp(14px, 2.5vh, 26px) clamp(20px, 3vw, 40px);
    z-index: 10;
  }

  #menu-view.open { transform: translateY(0); }

  #menu-close {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    background: none;
    border: none;
    color: rgba(245,247,250,0.5);
    padding-bottom: clamp(10px, 2vh, 18px);
  }

  #menu-close svg { width: 20px; height: 20px; }

  #menu-title {
    flex: 0 0 auto;
    font-size: clamp(13px, 2.4vh, 15px);
    color: rgba(245,247,250,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: clamp(10px, 2vh, 18px);
  }

  #tile-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    grid-auto-rows: minmax(90px, 1fr);
    gap: clamp(10px, 2vw, 18px);
    align-content: start;
  }

  .tile {
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    color: #f5f7fa;
    border: none;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .tile:active { transform: scale(0.95); }

  .tile .tile-icon { width: clamp(28px, 5vh, 36px); height: clamp(28px, 5vh, 36px); }
  .tile .tile-icon svg { width: 100%; height: 100%; }

  .tile .tile-label {
    font-size: clamp(12px, 2.2vh, 14px);
    font-weight: 500;
  }

</style>
</head>
<body>

  <div id="home-view">

    <div id="error-banner"></div>

    <div id="container">

      <div id="col-clock">
        <div id="clock">--:--</div>
        <div id="date">-</div>
      </div>

      <div id="col-main">
        <div id="icon-wrap"></div>
        <div id="main-text">
          <div id="temp">--<span class="deg">°</span></div>
          <div id="condition">Ładowanie…</div>
          <div id="location"></div>
        </div>
      </div>

      <div id="col-stats">
        <div class="stat"><div class="label">Odczuwalna</div><div class="value" id="stat-feels">--°</div></div>
        <div class="stat"><div class="label">Wilgotność</div><div class="value" id="stat-humidity">--%</div></div>
        <div class="stat"><div class="label">Wiatr</div><div class="value" id="stat-wind">-- km/h</div></div>
        <div class="stat"><div class="label">Zachód</div><div class="value" id="stat-sunset">--:--</div></div>
      </div>

    </div>

    <div id="hourly"></div>
    <div id="footer">Aktualizacja: <span id="last-updated">--</span></div>

    <div id="swipe-hint">
      <button type="button" onclick="openMenu()" aria-label="Otwórz menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>
      </button>
    </div>

  </div>

  <div id="menu-view">
    <button id="menu-close" type="button" onclick="closeMenu()" aria-label="Zamknij menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 9 12 15 6 9"/></svg>
    </button>
    <div id="menu-title">Menu</div>
    <div id="tile-grid"></div>
  </div>

<script>

  // ==========================================================================
  // KONFIGURACJA — edytuj to miejsce, zanim wgrasz plik na telefon
  // ==========================================================================
  const CONFIG = {
    cityName: "Warszawa",       // nazwa wyświetlana na ekranie
    latitude: 52.2297,          // szerokość geograficzna Twojej miejscowości
    longitude: 21.0122,         // długość geograficzna Twojej miejscowości
    refreshMinutes: 10          // co ile minut odświeżać dane
  };
  // ==========================================================================

  // ==========================================================================
  // KAFELKI MENU — żeby dodać kolejny skrót, dopisz nowy obiekt do tej listy.
  // "action: 'home'" = zamyka menu i wraca do pogody (bez przeładowania strony).
  // "url: '...'"      = otwiera podaną stronę (przeglądarka nawiguje tam w całości).
  // ==========================================================================
  const TILES = [
    {
      id: "youtube",
      label: "YouTube",
      url: "https://m.youtube.com",
      background: "linear-gradient(135deg, #e0453f, #a83530)",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="4"/><polygon points="10 9 15 12 10 15" fill="currentColor" stroke="none"/></svg>`
    },
    {
      id: "spotify",
      label: "Spotify",
      url: "https://accounts.spotify.com/login?continue=https%3A%2F%2Fopen.spotify.com%2F",
      background: "linear-gradient(135deg, #3fae63, #2c8049)",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M7 10c4-1 8-0.5 11 1.2"/><path d="M7.5 13c3-0.8 6.5-0.4 9 1"/><path d="M8 16c2.3-0.6 5-0.3 7 0.7"/></svg>`
    },
    {
      id: "home",
      label: "Pogoda",
      action: "home",
      background: "linear-gradient(135deg, #3b7bc4, #245a9c)",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15a4 4 0 0 1 1-7.9 6 6 0 0 1 11.4-2A5 5 0 0 1 19 15H4z"/><line x1="9" y1="19" x2="9" y2="21"/><line x1="13" y1="19" x2="13" y2="21"/></svg>`
    }
  ];

  const WEATHER_CODES = {
    0:  { text: "Bezchmurnie", cat: "clear" },
    1:  { text: "Prawie bezchmurnie", cat: "clear" },
    2:  { text: "Częściowe zachmurzenie", cat: "cloud" },
    3:  { text: "Pochmurno", cat: "cloud" },
    45: { text: "Mgła", cat: "fog" },
    48: { text: "Mgła osadzająca szron", cat: "fog" },
    51: { text: "Lekka mżawka", cat: "rain" },
    53: { text: "Mżawka", cat: "rain" },
    55: { text: "Gęsta mżawka", cat: "rain" },
    56: { text: "Marznąca mżawka", cat: "rain" },
    57: { text: "Marznąca mżawka", cat: "rain" },
    61: { text: "Lekki deszcz", cat: "rain" },
    63: { text: "Deszcz", cat: "rain" },
    65: { text: "Ulewny deszcz", cat: "rain" },
    66: { text: "Marznący deszcz", cat: "rain" },
    67: { text: "Marznący deszcz", cat: "rain" },
    71: { text: "Lekki śnieg", cat: "snow" },
    73: { text: "Śnieg", cat: "snow" },
    75: { text: "Intensywny śnieg", cat: "snow" },
    77: { text: "Śnieg ziarnisty", cat: "snow" },
    80: { text: "Przelotny deszcz", cat: "rain" },
    81: { text: "Przelotny deszcz", cat: "rain" },
    82: { text: "Gwałtowny deszcz", cat: "rain" },
    85: { text: "Przelotny śnieg", cat: "snow" },
    86: { text: "Przelotny śnieg", cat: "snow" },
    95: { text: "Burza", cat: "storm" },
    96: { text: "Burza z gradem", cat: "storm" },
    99: { text: "Burza z gradem", cat: "storm" }
  };

  const THEMES = {
    "day-clear":   { top: "#1f78c4", bottom: "#7fc2ea", accent: "#ffcf6b" },
    "day-cloud":   { top: "#4b5a6b", bottom: "#8a97a3", accent: "#d7dde3" },
    "day-fog":     { top: "#5a6570", bottom: "#909ca6", accent: "#c9d1d8" },
    "day-rain":    { top: "#1f4e5f", bottom: "#4a7c8c", accent: "#7fd3f0" },
    "day-snow":    { top: "#5f7c94", bottom: "#c3d9e6", accent: "#ffffff" },
    "day-storm":   { top: "#2b2640", bottom: "#554f7a", accent: "#c6b8ff" },
    "night-clear": { top: "#050814", bottom: "#131c33", accent: "#b9c7e0" },
    "night-cloud": { top: "#0a0d16", bottom: "#1c2333", accent: "#8a93a3" },
    "night-fog":   { top: "#0a0d12", bottom: "#232a30", accent: "#9aa5ab" },
    "night-rain":  { top: "#050c14", bottom: "#122436", accent: "#5fa8d0" },
    "night-snow":  { top: "#0a1018", bottom: "#28374a", accent: "#dceaf2" },
    "night-storm": { top: "#0a0714", bottom: "#241d3c", accent: "#a894f0" }
  };

  const ICONS = {
    clear: `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
      <circle cx="50" cy="50" r="20"/>
      <g class="anim-sun">
        <line x1="50" y1="8" x2="50" y2="20"/>
        <line x1="50" y1="80" x2="50" y2="92"/>
        <line x1="8" y1="50" x2="20" y2="50"/>
        <line x1="80" y1="50" x2="92" y2="50"/>
        <line x1="21" y1="21" x2="29" y2="29"/>
        <line x1="71" y1="71" x2="79" y2="79"/>
        <line x1="21" y1="79" x2="29" y2="71"/>
        <line x1="71" y1="29" x2="79" y2="21"/>
      </g>
    </svg>`,
    cloud: `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path class="anim-cloud" d="M28 62a16 16 0 1 1 4-31.5 20 20 0 0 1 38 8A14 14 0 0 1 68 66H30"/>
    </svg>`,
    fog: `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
      <line class="anim-fog" x1="18" y1="38" x2="82" y2="38"/>
      <line class="anim-fog" x1="12" y1="52" x2="88" y2="52"/>
      <line class="anim-fog" x1="20" y1="66" x2="80" y2="66"/>
    </svg>`,
    rain: `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M26 52a16 16 0 1 1 4-31.5 20 20 0 0 1 38 8A14 14 0 0 1 66 56H28"/>
      <line class="anim-drop" x1="34" y1="66" x2="34" y2="76"/>
      <line class="anim-drop" x1="50" y1="66" x2="50" y2="76"/>
      <line class="anim-drop" x1="66" y1="66" x2="66" y2="76"/>
    </svg>`,
    snow: `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M26 50a16 16 0 1 1 4-31.5 20 20 0 0 1 38 8A14 14 0 0 1 66 54H28"/>
      <circle class="anim-drop" cx="34" cy="68" r="2" fill="currentColor"/>
      <circle class="anim-drop" cx="50" cy="68" r="2" fill="currentColor"/>
      <circle class="anim-drop" cx="66" cy="68" r="2" fill="currentColor"/>
    </svg>`,
    storm: `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M26 48a16 16 0 1 1 4-31.5 20 20 0 0 1 38 8A14 14 0 0 1 66 52H28"/>
      <path class="anim-bolt" d="M52 58l-10 16h9l-4 12 13-18h-9l4-10z" fill="currentColor" stroke="none"/>
    </svg>`
  };

  function setTheme(cat, isDay) {
    const key = (isDay ? "day-" : "night-") + cat;
    const theme = THEMES[key] || THEMES["night-clear"];
    document.documentElement.style.setProperty("--sky-top", theme.top);
    document.documentElement.style.setProperty("--sky-bottom", theme.bottom);
    document.documentElement.style.setProperty("--accent", theme.accent);
  }

  function fmtHour(isoString) {
    return new Date(isoString).toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
  }

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("date").textContent =
      now.toLocaleDateString("pl-PL", { weekday: "long", day: "numeric", month: "long" });
  }

  function showError(message) {
    const banner = document.getElementById("error-banner");
    banner.textContent = message;
    banner.style.display = "block";
  }

  function hideError() {
    document.getElementById("error-banner").style.display = "none";
  }

  async function fetchWeather() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.latitude}&longitude=${CONFIG.longitude}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,is_day` +
      `&hourly=temperature_2m,weather_code` +
      `&daily=sunrise,sunset` +
      `&timezone=auto&forecast_days=2`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      renderWeather(data);
      hideError();
    } catch (err) {
      console.error(err);
      showError("Nie udało się pobrać pogody — sprawdzam ponownie za chwilę.");
    }
  }

  function renderWeather(data) {
    const cur = data.current;
    const info = WEATHER_CODES[cur.weather_code] || { text: "Brak danych", cat: "cloud" };
    const isDay = cur.is_day === 1;

    setTheme(info.cat, isDay);

    document.getElementById("icon-wrap").innerHTML = ICONS[info.cat] || ICONS.cloud;
    document.getElementById("temp").innerHTML = Math.round(cur.temperature_2m) + '<span class="deg">°</span>';
    document.getElementById("condition").textContent = info.text;
    document.getElementById("location").textContent = CONFIG.cityName;

    document.getElementById("stat-feels").textContent = Math.round(cur.apparent_temperature) + "°";
    document.getElementById("stat-humidity").textContent = Math.round(cur.relative_humidity_2m) + "%";
    document.getElementById("stat-wind").textContent = Math.round(cur.wind_speed_10m) + " km/h";
    document.getElementById("stat-sunset").textContent = fmtHour(data.daily.sunset[0]);

    renderHourly(data.hourly, cur.time);

    document.getElementById("last-updated").textContent =
      new Date().toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
  }

  function renderHourly(hourly, currentTimeIso) {
    const container = document.getElementById("hourly");
    container.innerHTML = "";

    let startIndex = hourly.time.findIndex(t => t >= currentTimeIso);
    if (startIndex === -1) startIndex = 0;

    for (let i = startIndex + 1; i <= startIndex + 6; i++) {
      if (!hourly.time[i]) continue;
      const code = hourly.weather_code[i];
      const info = WEATHER_CODES[code] || { cat: "cloud" };
      const el = document.createElement("div");
      el.className = "hour";
      el.innerHTML = `
        <div class="h-time">${fmtHour(hourly.time[i])}</div>
        <div class="h-icon">${ICONS[info.cat] || ICONS.cloud}</div>
        <div class="h-temp">${Math.round(hourly.temperature_2m[i])}°</div>
      `;
      container.appendChild(el);
    }
  }

  async function keepScreenAwake() {
    try {
      if ("wakeLock" in navigator) {
        await navigator.wakeLock.request("screen");
      }
    } catch (err) {
      console.warn("Wake lock nieobsługiwany lub odrzucony:", err);
    }
  }

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") keepScreenAwake();
  });

  function renderMenu() {
    const grid = document.getElementById("tile-grid");
    grid.innerHTML = "";
    TILES.forEach(tile => {
      const el = document.createElement(tile.url ? "a" : "button");
      el.className = "tile";
      el.style.background = tile.background;
      if (tile.url) {
        el.href = tile.url;
      } else {
        el.type = "button";
        el.addEventListener("click", () => { if (tile.action === "home") closeMenu(); });
      }
      el.innerHTML = `<span class="tile-icon">${tile.icon}</span><span class="tile-label">${tile.label}</span>`;
      grid.appendChild(el);
    });
  }

  function openMenu() {
    document.getElementById("menu-view").classList.add("open");
  }

  function closeMenu() {
    document.getElementById("menu-view").classList.remove("open");
  }

  // Obsluga gestu przesuniecia palcem: w gore na ekranie pogody otwiera menu,
  // w dol na menu je zamyka. Dziala rownolegle z przyciskami-strzalkami,
  // ktore sa awaryjnym sposobem sterowania, gdyby gest nie zadzialal w danej przegladarce.
  let touchStartY = null;
  const SWIPE_THRESHOLD = 60;

  document.addEventListener("touchstart", (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener("touchend", (e) => {
    if (touchStartY === null) return;
    const deltaY = e.changedTouches[0].clientY - touchStartY;
    const menuOpen = document.getElementById("menu-view").classList.contains("open");

    if (!menuOpen && deltaY < -SWIPE_THRESHOLD) {
      openMenu();
    } else if (menuOpen && deltaY > SWIPE_THRESHOLD) {
      closeMenu();
    }
    touchStartY = null;
  }, { passive: true });

  // Start
  renderMenu();
  updateClock();
  setInterval(updateClock, 1000);
  fetchWeather();
  setInterval(fetchWeather, CONFIG.refreshMinutes * 60 * 1000);
  keepScreenAwake();

</script>
</body>
</html>
